name: Daily Finance Briefing

on:
  schedule:
    - cron: "7 1 * * 1-6"
  workflow_dispatch:
    inputs:
      run_date:
        description: "Optional KST run date in YYYY-MM-DD format"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-finance-briefing
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Generate briefing site
        shell: bash
        env:
          RUN_DATE: ${{ github.event.inputs.run_date }}
        run: |
          if [ -n "$RUN_DATE" ]; then
            python -m daily_finance_briefing generate --run-date "$RUN_DATE" --output site --config config/assets.yml
          else
            python -m daily_finance_briefing generate --output site --config config/assets.yml
          fi

      - name: Commit generated files
        id: commit
        shell: bash
        env:
          INPUT_RUN_DATE: ${{ github.event.inputs.run_date }}
        run: |
          if [ -n "$(git status --porcelain -- site)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add site
            RUN_DATE="$INPUT_RUN_DATE"
            if [ -z "$RUN_DATE" ]; then
              RUN_DATE=$(TZ=Asia/Seoul date +%F)
            fi
            git commit -m "chore: update daily finance briefing for ${RUN_DATE}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No site changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
